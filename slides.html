<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Slides - Yuyang's Blog</title>
  <link rel="icon" href="./images/icon/像素_小鸭.png" type="image/x-icon">

  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- marked & highlight.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- MathJax v3 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\(', '\)']],
        displayMath: [['$$', '$$'], ['\[', '\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: {
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    :root {
      --bg:           #f7f6f2;
      --surface:      #ffffff;
      --surface-2:    #f0efe9;
      --border:       #e4e2da;
      --text:         #1a1916;
      --text-2:       #6b6860;
      --text-3:       #9c9a95;
      --accent:       #c0392b;
      --accent-light: #f9ebe9;
      --accent-dark:  #922b21;
      --radius:       8px;
      --shadow:       0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
      --transition:   .22s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; border: none; background: none; }

    #app { 
      display: flex; 
      height: 100vh;
      width: 100vw;
    }

    /* 顶部工具栏 */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(247,246,242,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent) 0%, #e67e22 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 500;
      transition: all var(--transition);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
    }

    .btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .slide-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: .85rem;
      color: var(--text-2);
      background: var(--surface-2);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* 主内容区 */
    #main {
      display: flex;
      width: 100%;
      height: calc(100vh - 56px);
      margin-top: 56px;
    }

    /* 编辑器区域 */
    #editor-panel {
      width: 40%;
      min-width: 300px;
      max-width: 600px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width var(--transition);
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-2);
    }

    .panel-title {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title svg {
      width: 16px;
      height: 16px;
      color: var(--accent);
    }

    .panel-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: all var(--transition);
    }

    .icon-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    .icon-btn svg {
      width: 14px;
      height: 14px;
    }

    #editor {
      flex: 1;
      width: 100%;
      padding: 20px;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem;
      line-height: 1.8;
      color: var(--text);
      background: var(--surface);
      resize: none;
      tab-size: 2;
    }

    #editor::placeholder {
      color: var(--text-3);
    }

    /* 预览区域 */
    #preview-panel {
      flex: 1;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #slides-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    .slide-wrapper {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16/9;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .slide {
      width: 100%;
      height: 100%;
      padding: 4vw 6vw;
      overflow-y: auto;
      display: none;
    }

    .slide.active {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Markdown 样式 - 使用 clamp() 实现响应式字号 */
    .slide-content {
      font-size: clamp(1rem, 2.5vw, 2.5rem);
      line-height: 1.5;
      color: var(--text);
      width: 100%;
      max-width: 100%;
    }

    .slide-content * {
      text-align: center;
    }

    .slide-content h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2rem, 5vw, 5rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5em;
      line-height: 1.2;
      border-bottom: none;
      padding-bottom: 0;
    }

    .slide-content h2 {
      font-family: 'Lora', serif;
      font-size: clamp(1.8rem, 4vw, 4rem);
      font-weight: 600;
      color: var(--text);
      margin: 0.8em 0 0.5em;
      line-height: 1.3;
    }

    .slide-content h3 {
      font-family: 'Lora', serif;
      font-size: clamp(1.5rem, 3vw, 3rem);
      font-weight: 600;
      color: var(--text-2);
      margin: 0.6em 0 0.4em;
    }

    .slide-content p {
      margin-bottom: 0.8em;
      font-size: clamp(1rem, 2.5vw, 2.5rem);
    }

    .slide-content ul, .slide-content ol {
      margin: 0.5em 0;
      padding-left: 0;
      list-style-position: inside;
      display: inline-block;
      text-align: left;
    }

    .slide-content li {
      margin-bottom: 0.4em;
      font-size: clamp(0.9rem, 2.2vw, 2.2rem);
      text-align: left;
    }

    .slide-content blockquote {
      border-left: none;
      background: transparent;
      margin: 1em 0;
      padding: 0;
      color: var(--text-2);
      font-style: italic;
      font-size: clamp(1.2rem, 3vw, 3rem);
    }

    .slide-content blockquote::before {
      content: '"';
      font-size: clamp(2rem, 5vw, 5rem);
      color: var(--accent);
      line-height: 0;
      vertical-align: middle;
      margin-right: 0.2em;
    }

    .slide-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 0.1em 0.3em;
      border-radius: 4px;
      color: var(--accent-dark);
    }

    .slide-content pre {
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 2vw;
      overflow-x: auto;
      margin: 1em auto;
      border: 1px solid var(--border);
      max-width: 90%;
      text-align: left;
    }

    .slide-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: clamp(0.7rem, 1.5vw, 1.5rem);
      color: var(--text);
    }

    .slide-content img {
      max-width: 80%;
      max-height: 40vh;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin: 0.5em auto;
      display: block;
      box-shadow: var(--shadow);
    }

    .slide-content table {
      width: auto;
      max-width: 90%;
      border-collapse: collapse;
      margin: 1em auto;
      font-size: clamp(0.8rem, 2vw, 2rem);
    }

    .slide-content th {
      background: var(--surface-2);
      font-weight: 600;
      border: 1px solid var(--border);
      padding: 1vw 2vw;
      text-align: center;
    }

    .slide-content td {
      border: 1px solid var(--border);
      padding: 0.8vw 2vw;
      text-align: center;
    }

    .slide-content tr:nth-child(even) td {
      background: var(--surface-2);
    }

    .slide-content hr {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1.5em auto;
      width: 60%;
    }

    /* 幻灯片导航 */
    #slides-nav {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 100;
    }

    .nav-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: all var(--transition);
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .nav-btn svg {
      width: 18px;
      height: 18px;
    }

    .slide-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: all var(--transition);
    }

    .dot:hover {
      background: var(--text-3);
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.2);
    }

    /* 全屏模式 - 使用原生全屏 */
    :fullscreen #app {
      background: var(--bg);
    }

    :fullscreen #toolbar,
    :fullscreen #editor-panel {
      display: none;
    }

    :fullscreen #main {
      margin-top: 0;
      height: 100vh;
    }

    :fullscreen #preview-panel {
      background: var(--bg);
    }

    :fullscreen .slide-wrapper {
      max-width: none;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }

    :fullscreen .slide {
      padding: 6vw 10vw;
    }

    /* 全屏时隐藏翻页条 */
    :fullscreen #slides-nav {
      display: none;
    }

    .exit-fullscreen {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 6px;
      font-size: .85rem;
      color: var(--text-2);
      box-shadow: var(--shadow);
      align-items: center;
      gap: 6px;
    }

    .exit-fullscreen:hover {
      background: var(--accent-light);
      color: var(--accent);
    }

    :fullscreen .exit-fullscreen {
      display: flex;
    }

    /* Webkit 浏览器全屏 */
    :-webkit-full-screen #app {
      background: var(--bg);
    }

    :-webkit-full-screen #toolbar,
    :-webkit-full-screen #editor-panel {
      display: none;
    }

    :-webkit-full-screen #main {
      margin-top: 0;
      height: 100vh;
    }

    :-webkit-full-screen #preview-panel {
      background: var(--bg);
    }

    :-webkit-full-screen .slide-wrapper {
      max-width: none;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }

    :-webkit-full-screen .slide {
      padding: 6vw 10vw;
    }

    :-webkit-full-screen #slides-nav {
      display: none;
    }

    :-webkit-full-screen .exit-fullscreen {
      display: flex;
    }

    /* Firefox 全屏 */
    :-moz-full-screen #app {
      background: var(--bg);
    }

    :-moz-full-screen #toolbar,
    :-moz-full-screen #editor-panel {
      display: none;
    }

    :-moz-full-screen #main {
      margin-top: 0;
      height: 100vh;
    }

    :-moz-full-screen #preview-panel {
      background: var(--bg);
    }

    :-moz-full-screen .slide-wrapper {
      max-width: none;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }

    :-moz-full-screen .slide {
      padding: 6vw 10vw;
    }

    :-moz-full-screen #slides-nav {
      display: none;
    }

    :-moz-full-screen .exit-fullscreen {
      display: flex;
    }

    /* 空状态 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-3);
      text-align: center;
      padding: 40px;
    }

    .empty-state svg {
      width: clamp(40px, 8vw, 80px);
      height: clamp(40px, 8vw, 80px);
      margin-bottom: 24px;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-family: 'Lora', serif;
      font-size: clamp(1.5rem, 4vw, 4rem);
      margin-bottom: 12px;
      color: var(--text-2);
    }

    .empty-state p {
      font-size: clamp(1rem, 2vw, 2rem);
      max-width: 80%;
      line-height: 1.6;
    }

    /* 缩略图侧边栏 */
    #thumbnails-panel {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 240px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform var(--transition);
      z-index: 50;
    }

    #thumbnails-panel.open {
      transform: translateX(0);
    }

    .thumbnails-header {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 6px;
      margin-bottom: 12px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: all var(--transition);
    }

    .thumbnail:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .thumbnail.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    .thumbnail-inner {
      width: 400%;
      height: 400%;
      transform: scale(0.25);
      transform-origin: top left;
    }

    .thumbnail-slide-content {
      width: 100%;
      height: 100%;
      padding: 4vw 6vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      font-size: clamp(1rem, 2.5vw, 2.5rem);
      line-height: 1.5;
      color: var(--text);
      text-align: center;
    }

    .thumbnail-slide-content * {
      text-align: center;
    }

    .thumbnail-slide-content h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2rem, 5vw, 5rem);
      font-weight: 700;
      margin-bottom: 0.5em;
    }

    .thumbnail-slide-content h2 {
      font-family: 'Lora', serif;
      font-size: clamp(1.8rem, 4vw, 4rem);
      font-weight: 600;
      margin: 0.8em 0 0.5em;
    }

    .thumbnail-slide-content h3 {
      font-family: 'Lora', serif;
      font-size: clamp(1.5rem, 3vw, 3rem);
      font-weight: 600;
      color: var(--text-2);
    }

    .thumbnail-slide-content p {
      margin-bottom: 0.8em;
      font-size: clamp(1rem, 2.5vw, 2.5rem);
    }

    .thumbnail-slide-content ul, .thumbnail-slide-content ol {
      margin: 0.5em 0;
      padding-left: 0;
      list-style-position: inside;
      display: inline-block;
      text-align: left;
    }

    .thumbnail-slide-content li {
      margin-bottom: 0.4em;
      font-size: clamp(0.9rem, 2.2vw, 2.2rem);
      text-align: left;
    }

    .thumbnail-slide-content pre {
      display: none;
    }

    .thumbnail-slide-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--surface-2);
      padding: 0.1em 0.3em;
      border-radius: 4px;
    }

    .thumbnail-slide-content img {
      max-width: 60%;
      max-height: 20vh;
    }

    .thumbnail-slide-content blockquote {
      font-style: italic;
      color: var(--text-2);
      margin: 1em 0;
    }

    .thumbnail-slide-content table {
      font-size: clamp(0.8rem, 2vw, 2rem);
      margin: 1em auto;
    }

    .thumbnail-num {
      position: absolute;
      top: 4px;
      left: 8px;
      font-size: .7rem;
      font-family: 'JetBrains Mono', monospace;
      background: var(--accent);
      color: white;
      padding: 2px 6px;
      border-radius: 10px;
      z-index: 10;
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      #editor-panel {
        width: 35%;
      }
    }

    @media (max-width: 768px) {
      #editor-panel {
        position: absolute;
        left: 0;
        top: 56px;
        bottom: 0;
        width: 80%;
        max-width: none;
        z-index: 200;
        transform: translateX(-100%);
        transition: transform var(--transition);
      }

      #editor-panel.open {
        transform: translateX(0);
      }

      #preview-panel {
        width: 100%;
      }

      .slide {
        padding: 6vw;
      }

      #thumbnails-panel {
        width: 200px;
      }
    }

    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-3);
    }

    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .slide.active .slide-content {
      animation: fadeIn 0.4s ease;
    }

    /* 提示信息 */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: .85rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 2000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div id="app">
    <!-- 顶部工具栏 -->
    <header id="toolbar">
      <div class="toolbar-left">
        <div class="logo">
          <div class="logo-icon">L</div>
          <span>Markdown Slides</span>
        </div>
        <div class="slide-counter">
          <span id="current-slide">1</span> / <span id="total-slides">1</span>
        </div>
      </div>

      <div class="toolbar-actions">
        <input type="file" id="file-input" accept=".md,.markdown,.txt" style="display: none;">
        <button class="btn" onclick="window.location.href='https://rectangle518.github.io/blog-passages/index_new.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5"/>
            <path d="M12 19l-7-7 7-7"/>
          </svg>
          返回博客首页
        </button>
        <button class="btn" onclick="document.getElementById('file-input').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          上传 Markdown
        </button>
        <button class="btn" onclick="toggleThumbnails()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          内容预览
        </button>
        <button class="btn btn-primary" onclick="toggleFullscreen()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
          放映
        </button>
      </div>
    </header>

    <!-- 主内容 -->
    <main id="main">
      <!-- 编辑器面板 -->
      <aside id="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            编辑区
          </div>
          <div class="panel-actions">
            <button class="icon-btn" onclick="clearEditor()" title="清空">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
            <button class="icon-btn" onclick="downloadMarkdown()" title="下载">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </div>
        <textarea id="editor" placeholder="在此输入 Markdown...&#10;&#10;输入 %%% 进行幻灯片分页 &#10;&#10;右侧预览区域仅供参考&#10;&#10;实际效果请点击右上角进行放映&#10;&#10;"></textarea>
      </aside>

      <!-- 预览面板 -->
      <div id="preview-panel">
        <div id="slides-container">
          <div class="slide-wrapper">
            <div id="slides-list"></div>
          </div>
        </div>

        <!-- 幻灯片导航 -->
        <div id="slides-nav">
          <button class="nav-btn" id="prev-btn" onclick="prevSlide()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="slide-dots" id="slide-dots"></div>
          <button class="nav-btn" id="next-btn" onclick="nextSlide()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>

        <!-- 缩略图面板 -->
        <aside id="thumbnails-panel">
          <div class="thumbnails-header">每页内容提要</div>
          <div id="thumbnails-list"></div>
        </aside>

        <!-- 退出全屏按钮 -->
        <!-- <button class="exit-fullscreen" onclick="toggleFullscreen()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/>
          </svg>
          退出放映 (ESC)
        </button> -->
      </div>
    </main>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>
  </div>

  <script>
    // 状态管理
    let currentSlideIndex = 0;
    let slides = [];
    let isFullscreen = false;

    // DOM 元素
    const editor = document.getElementById('editor');
    const slidesList = document.getElementById('slides-list');
    const currentSlideEl = document.getElementById('current-slide');
    const totalSlidesEl = document.getElementById('total-slides');
    const slideDots = document.getElementById('slide-dots');
    const thumbnailsList = document.getElementById('thumbnails-list');
    const fileInput = document.getElementById('file-input');
    const toast = document.getElementById('toast');
    const app = document.getElementById('app');

    // 初始化
    function init() {
      // 配置 marked
      marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: false
      });

      // 监听编辑器输入
      editor.addEventListener('input', debounce(updateSlides, 300));

      // 监听文件上传
      fileInput.addEventListener('change', handleFileUpload);

      // 键盘导航
      document.addEventListener('keydown', handleKeydown);

      // 监听全屏变化
      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
      document.addEventListener('mozfullscreenchange', handleFullscreenChange);
      document.addEventListener('MSFullscreenChange', handleFullscreenChange);

      // 初始渲染
      updateSlides();
    }

    // 防抖函数
    function debounce(fn, delay) {
      let timer = null;
      return function() {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => {
          fn.apply(this, arguments);
        }, delay);
      };
    }

    // 更新幻灯片 - 使用 %%% 作为分页符
    function updateSlides() {
      const content = editor.value;
      const rawSlides = content.split(/^%%%$/m).map(s => s.trim()).filter(s => s);

      if (rawSlides.length === 0) {
        slides = [{ content: '<div class="empty-state"></div>' }];
      } else {
        slides = rawSlides.map(raw => {
          const html = marked.parse(raw);
          return { content: html };
        });
      }

      renderSlides();
      renderThumbnails();
      updateSlideInfo();
      updateNavButtons();

      // 重新渲染 MathJax
      if (window.MathJax) {
        MathJax.typesetPromise([slidesList]).catch(err => console.warn('MathJax error:', err));
      }
    }

    // 渲染幻灯片
    function renderSlides() {
      slidesList.innerHTML = slides.map((slide, index) => `
        <div class="slide ${index === currentSlideIndex ? 'active' : ''}" data-index="${index}">
          <div class="slide-content">${slide.content}</div>
        </div>
      `).join('');

      // 代码高亮
      slidesList.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
      });
    }

    // 渲染缩略图 - 显示实际内容预览
    function renderThumbnails() {
      thumbnailsList.innerHTML = slides.map((slide, index) => `
        <div class="thumbnail ${index === currentSlideIndex ? 'active' : ''}" onclick="goToSlide(${index})">
          <span class="thumbnail-num">${index + 1}</span>
          <div class="thumbnail-inner">
            <div class="thumbnail-slide-content">${slide.content}</div>
          </div>
        </div>
      `).join('');
    }

    // 渲染导航点
    function renderDots() {
      slideDots.innerHTML = slides.map((_, index) => `
        <div class="dot ${index === currentSlideIndex ? 'active' : ''}" onclick="goToSlide(${index})"></div>
      `).join('');
    }

    // 更新幻灯片信息
    function updateSlideInfo() {
      currentSlideEl.textContent = currentSlideIndex + 1;
      totalSlidesEl.textContent = slides.length;
      renderDots();

      // 更新缩略图高亮
      thumbnailsList.querySelectorAll('.thumbnail').forEach((thumb, i) => {
        thumb.classList.toggle('active', i === currentSlideIndex);
      });
    }

    // 更新导航按钮状态
    function updateNavButtons() {
      document.getElementById('prev-btn').disabled = currentSlideIndex === 0;
      document.getElementById('next-btn').disabled = currentSlideIndex === slides.length - 1;
    }

    // 导航函数
    function prevSlide() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        renderSlides();
        updateSlideInfo();
        updateNavButtons();
      }
    }

    function nextSlide() {
      if (currentSlideIndex < slides.length - 1) {
        currentSlideIndex++;
        renderSlides();
        updateSlideInfo();
        updateNavButtons();
      }
    }

    function goToSlide(index) {
      if (index >= 0 && index < slides.length) {
        currentSlideIndex = index;
        renderSlides();
        updateSlideInfo();
        updateNavButtons();
      }
    }

    // 键盘控制
    function handleKeydown(e) {
      if (e.target === editor) return;

      switch(e.key) {
        case 'ArrowLeft':
        case 'ArrowUp':
        case 'PageUp':
          e.preventDefault();
          prevSlide();
          break;
        case 'ArrowRight':
        case 'ArrowDown':
        case 'PageDown':
        case ' ':
          e.preventDefault();
          nextSlide();
          break;
        case 'Home':
          e.preventDefault();
          goToSlide(0);
          break;
        case 'End':
          e.preventDefault();
          goToSlide(slides.length - 1);
          break;
        case 'Escape':
          if (isFullscreen) {
            exitFullscreen();
          }
          break;
        case 'f':
        case 'F':
          if (!e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            toggleFullscreen();
          }
          break;
      }
    }

    // 原生全屏 API
    function toggleFullscreen() {
      if (!isFullscreen) {
        enterFullscreen();
      } else {
        exitFullscreen();
      }
    }

    function enterFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.mozRequestFullScreen) {
        elem.mozRequestFullScreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    function exitFullscreen() {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.mozCancelFullScreen) {
        document.mozCancelFullScreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
    }

    function handleFullscreenChange() {
      isFullscreen = !!(document.fullscreenElement || 
                       document.webkitFullscreenElement || 
                       document.mozFullScreenElement || 
                       document.msFullscreenElement);
    }

    // 缩略图面板切换
    function toggleThumbnails() {
      document.getElementById('thumbnails-panel').classList.toggle('open');
    }

    // 文件上传处理
    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        editor.value = event.target.result;
        currentSlideIndex = 0;
        updateSlides();
        showToast(`已加载: ${file.name}`);
      };
      reader.readAsText(file);

      // 清空 input 以便重复上传同一文件
      e.target.value = '';
    }

    // 清空编辑器
    function clearEditor() {
      if (confirm('确定要清空所有内容吗？')) {
        editor.value = '';
        currentSlideIndex = 0;
        updateSlides();
      }
    }

    // 下载 Markdown
    function downloadMarkdown() {
      const content = editor.value;
      if (!content.trim()) {
        showToast('没有内容可下载');
        return;
      }

      const blob = new Blob([content], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `slides-${new Date().toISOString().slice(0, 10)}.md`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('已下载 Markdown 文件');
    }

    // 显示提示
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // 启动
    init();
  </script>
</body>
</html>
